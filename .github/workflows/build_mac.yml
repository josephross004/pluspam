name: Build MacOS Release
on:
  push:
    tags:
      - 'v*' # Runs when you push a tag like v1.0

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pyinstaller
          # Add any other python libs your gui.py needs here
          # pip install fftw (if needed)

      - name: Compile C++ Binary
        run: |
          # Since this is running ON a Mac, we just use standard clang++
          clang++ -std=c++17 -O3 -arch arm64 src/main.cpp -o spec_gen_mac -lfftw3f

      - name: Build App with PyInstaller
        run: |
          # We bundle the C++ binary inside the App
          pyinstaller --onefile --noconsole --add-data "spec_gen_mac:." src/viewer/gui.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pluspam-mac-app
          path: dist/gui