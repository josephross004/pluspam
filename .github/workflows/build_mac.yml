name: Package Mac GUI
on:
  push:
    tags:
      - 'v*'

jobs:
  bundle-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install Python Dependencies
        run: |
          pip install pyinstaller numpy matplotlib

      - name: Debug - List files
        run: find . -name "spec_gen_mac"

      - name: Ensure binary is executable
        # Update the path to wherever you committed the binary
        run: chmod +x dist/mac64/spec_gen_mac

      - name: Bundle with PyInstaller
        run: |
          pyinstaller --onefile --noconsole \
            --add-data "dist/mac64/spec_gen_mac:." \
            src/viewer/gui.py

      - name: Upload Mac Executable
        uses: actions/upload-artifact@v4
        with:
          name: pluspam-macos
          path: dist/gui